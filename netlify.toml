# Netlify Configuration File
# Build settings for Masterchecker (LinkShield) frontend

[build]
  # Install dependencies in frontend and build
  command = "cd frontend && npm install && npm run build"
  # Published directory
  publish = "frontend/build"
  # Node version
  node_version = "18.17.0"

[build.environment]
  # React app API URL - update after backend deployment
  REACT_APP_API_URL = "http://localhost:5000/api"
  # Skip preflight checks to avoid peer dependency warnings
  SKIP_PREFLIGHT_CHECK = "true"
  # Disable source maps to speed up builds
  GENERATE_SOURCEMAP = "false"

# Redirect all requests to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"

# Cache static assets
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "max-age=31536000"
